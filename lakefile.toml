name = "pvsnp_proof"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Basic"]  # Changed from PvsnpProof

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "Basic"               # Changed from PvsnpProof
srcDir = "."                 # Explicitly tells Lean the source is in the root